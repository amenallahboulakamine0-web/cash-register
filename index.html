<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cash Register</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <h1>💵 Cash Register</h1>
    
    <div class="price-display">Price: $<span id="price-display">19.50</span></div>
    
    <div class="input-group">
      <label for="cash">Cash Received</label>
      <input type="number" id="cash" placeholder="Enter cash amount" step="0.01" min="0" />
    </div>
    
    <button id="purchase-btn">Process Purchase</button>
    
    <div id="alert-message" class="alert alert-warning hidden"></div>
    
    <div id="change-due"></div>
    
    <div class="change-breakdown hidden" id="change-breakdown">
      <h4>Change Breakdown:</h4>
      <div id="change-items"></div>
    </div>
    
    <div class="drawer">
      <h3>Cash Drawer</h3>
      <div class="drawer-items" id="drawer-items">
      </div>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
